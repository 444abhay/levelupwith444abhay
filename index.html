<!DOCTYPE html>
<html lang="en">
<head>

        .box { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; max-width: 380px; margin: 20px auto; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .btn { width: 95%; padding: 14px; background: var(--neon); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .hidden { display: none; }
        .card { background: var(--card); border: 2px solid var(--neon); padding: 20px; border-radius: 20px; max-width: 380px; margin: 20px auto; position: relative; overflow: hidden; }
        .stat-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--neon); color: var(--neon); border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .stat-btn:active { background: var(--neon); color: black; }
        .logout-btn { background: #ff4444; color: white; width: 150px; margin-top: 30px; }
    </style>
</head>
<body>

            <button class="btn" onclick="verifyOTP()">Verify & Awaken</button>
        </div>
    </div>

    <div id="reg-section" class="box hidden">
        <h2 style="color: var(--neon);">NEW HUNTER DETECTED</h2>
        <p>Register your DNA to the system</p>
        <input type="text" id="hunter-name" placeholder="Full Name">
        <p style="text-align:left; font-size:12px; margin-left:20px;">Profile Picture:</p>
