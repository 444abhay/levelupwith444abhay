        if (!emailInput) {
            alert("Pehle email dalo, Hunter!");
            return;
        }

        const { data, error } = await supabase.auth.signInWithOtp({ 
            email: emailInput, 
            options: { shouldCreateUser: true }
        });

        if (error) {
            console.error("Supabase Error:", error.message);
            alert("Error: " + error.message);
        } else {
            alert("OTP bhej diya gaya hai! Check your inbox.");
        }
    }

            alert("OTP toh dalo!");
            return;
        }

        // OTP verification logic
        const { data, error } = await supabase.auth.verifyOtp({
            email: emailInput,
            token: tokenInput,
            type: 'email' 
        });

            // Agar pehli baar fail ho toh signup try karo

                email: emailInput,
                token: tokenInput,
                type: 'signup'
            });
            
            if (error2) alert("Invalid OTP!");
            else window.location.reload();
        } else {
            window.location.reload();
        }
    }
