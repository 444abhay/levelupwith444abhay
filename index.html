<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-RANK HUNTER SYSTEM v6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --s-rank: #ff0044; --dark-bg: #050505; --card-bg: #11111d; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 15px; margin: 0; }
        .main-box { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: 10px auto; }
        input { width: 90%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; }
        .awaken-btn { width: 95%; padding: 15px; background: var(--neon); border: none; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; color: #000; }
        .card { background: var(--card-bg); margin: 20px auto; padding: 18px; border-radius: 18px; text-align: left; border: 1px solid #222; max-width: 400px; }
        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .user-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; }
        .quest-sec { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; }
        .q-row { margin-bottom: 15px; }
        .bar-bg { background: #222; height: 10px; border-radius: 5px; overflow: hidden; margin: 5px 0; }
        .bar-fill { height: 100%; transition: 0.5s; }
        .record-btn { width: 100%; background: #222; border: 1px solid var(--neon); color: var(--neon); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .record-btn:active { background: var(--neon); color: #000; }
    </style>
</head>
<body>

    <div class="main-box">
        <h2>System Interface</h2>
        <input type="text" id="name" placeholder="Hunter Name">
        <input type="number" id="phone" placeholder="Phone Number">
        <input type="file" id="pic" accept="image/*" style="margin: 10px 0;">
        <button class="awaken-btn" onclick="reg()">Begin Awakening</button>
    </div>

    <div id="list"></div>

    <script>
        const SUPABASE_URL = 'https://wtuqqbgdekhuwieznaxw.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0dXFxYmdkZWtodXdpZXpuYXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODI5MzgsImV4cCI6MjA5MTc1ODkzOH0.reg4QhMeaEerMVsIFNebgQ7pn2U3RtvDSS59NGrVRrY';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function reg() {
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            const f = document.getElementById('pic').files[0];
            if(!n || !f) return alert("Fill all fields!");

            const reader = new FileReader();
            reader.readAsDataURL(f);
            reader.onload = async () => {
                const { error } = await sb.from('hunters').insert([{ 
                    name: n, phone: p, level: 1, image_url: reader.result,
                    pushups: 0, situps: 0, squats: 0 
                }]);
                if(!error) location.reload(); else alert("Error at Gate!");
            };
        }

        async function updateQuest(id, type, current) {
            const newVal = current + 10;
            const { error } = await sb.from('hunters').update({ [type]: newVal }).eq('id', id);
            if(!error) load(); else alert("Update failed!");
        }

        async function load() {
            const { data } = await sb.from('hunters').select('*').order('created_at', { ascending: false });
            if(data) {
                document.getElementById('list').innerHTML = data.map(h => `
                <div class="card">
                    <div class="user-header">
                        <img src="${h.image_url}" class="user-img">
                        <div>
                            <b>${h.name}</b><br>
                            <small style="color:var(--neon)">LEVEL ${h.level}</small>
                        </div>
                    </div>
                    <div class="quest-sec">
                        ${['pushups', 'situps', 'squats'].map(q => `
                            <div class="q-row">
                                <small>${q.toUpperCase()}: ${h[q] || 0}/100</small>
                                <div class="bar-bg"><div class="bar-fill" style="width:${h[q]}%; background:var(--neon)"></div></div>
                                <button class="record-btn" onclick="updateQuest('${h.id}', '${q}', ${h[q] || 0})">+ RECORD 10 REPS</button>
                            </div>
                        `).join('')}
                    </div>
                </div>`).join('');
            }
        }
        load();
    </script>
</body>
</html>
