<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-RANK HUNTER SYSTEM (OTP)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; max-width: 380px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; }
        .btn { width: 95%; padding: 14px; background: var(--neon); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-box" class="box">
        <h2 style="color:var(--neon)">SYSTEM ACCESS</h2>
        <input type="email" id="email" placeholder="Hunter Email Address">
        <button class="btn" onclick="sendOTP()">SEND OTP</button>
        <div id="otp-input" class="hidden">
            <input type="number" id="otp" placeholder="Enter 6-Digit OTP">
            <button class="btn" onclick="verifyOTP()">VERIFY & LOGIN</button>
        </div>
    </div>

    <div id="reg-box" class="box hidden">
        <h2 style="color:var(--neon)">HUNTER REGISTRATION</h2>
        <input type="text" id="h-name" placeholder="Full Name">
        <input type="file" id="h-pic" accept="image/*">
        <button class="btn" onclick="createProfile()">AWAKEN PROFILE</button>
    </div>

    <div id="dashboard" class="hidden">
        <div id="profile-content"></div>
        <button class="btn" style="background:#ff4444; color:white; width:150px" onclick="logout()">LOGOUT</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://wtuqqbgdekhuwieznaxw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0dXFxYmdkZWtodXdpZXpuYXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODI5MzgsImV4cCI6MjA5MTc1ODkzOH0.reg4QhMeaEerMVsIFNebgQ7pn2U3RtvDSS59NGrVRrY';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function sendOTP() {
            const email = document.getElementById('email').value;
            const { error } = await sb.auth.signInWithOtp({ email });
            if(error) alert(error.message);
            else { alert("OTP Sent!"); document.getElementById('otp-input').classList.remove('hidden'); }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const token = document.getElementById('otp').value;
            const { error } = await sb.auth.verifyOtp({ email, token, type: 'email' });
            if(error) alert("Invalid OTP"); else checkUser();
        }

        async function checkUser() {
            const { data: { user } } = await sb.auth.getUser();
            if(user) {
                document.getElementById('auth-box').classList.add('hidden');
                const { data } = await sb.from('hunters').select('*').eq('user_id', user.id).maybeSingle();
                if(data) {
                    document.getElementById('dashboard').classList.remove('hidden');
                    renderProfile(data);
                } else {
                    document.getElementById('reg-box').classList.remove('hidden');
                }
            }
        }

        async function createProfile() {
            const { data: { user } } = await sb.auth.getUser();
            const name = document.getElementById('h-name').value;
            const f = document.getElementById('h-pic').files[0];
            const reader = new FileReader();
            reader.readAsDataURL(f);
            reader.onload = async () => {
                const { error } = await sb.from('hunters').insert([{
                    name, user_id: user.id, image_url: reader.result, level: 1, pushups: 0, situps: 0, squats: 0
                }]);
                if(!error) checkUser(); else alert(error.message);
            };
        }

        function renderProfile(h) {
            document.getElementById('profile-content').innerHTML = `<h3>${h.name}</h3><p>LEVEL ${h.level}</p>`;
        }

        async function logout() { await sb.auth.signOut(); location.reload(); }
        checkUser();
    </script>
</body>
</html>
