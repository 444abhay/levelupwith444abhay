<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-RANK HUNTER SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --s-rank: #ff0044; }
        body { background: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .main-box { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        input { width: 85%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--neon); color: white; border-radius: 8px; }
        .file-btn { display: inline-block; padding: 10px; border: 1px dashed var(--neon); margin: 10px 0; cursor: pointer; width: 85%; font-size: 12px; }
        button.awaken-btn { width: 92%; padding: 15px; background: var(--neon); border: none; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        
        /* Card Style */
        .card { 
            background: linear-gradient(145deg, #161625, #0a0a12); margin-top: 20px; padding: 15px; border-radius: 15px; 
            display: flex; flex-direction: column; gap: 12px; text-align: left; border: 1px solid #222; position: relative; overflow: hidden;
        }
        .user-header { display: flex; align-items: center; gap: 15px; }
        .user-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; box-shadow: 0 0 10px var(--neon); }
        
        /* Quest Bars */
        .quest-sec { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; }
        .q-row { margin: 8px 0; }
        .q-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
        .bar-bg { background: #222; height: 6px; border-radius: 3px; position: relative; }
        .bar-fill { background: var(--neon); height: 100%; border-radius: 3px; transition: 0.4s; box-shadow: 0 0 8px var(--neon); }
        .btn-plus { background: var(--neon); color: black; border: none; border-radius: 4px; padding: 0 8px; cursor: pointer; font-weight: bold; font-size: 14px; float: right; margin-top: -18px; }

        .diet-tag { font-size: 11px; border-left: 3px solid var(--neon); padding-left: 8px; margin-top: 5px; color: #aaa; }
    </style>
</head>
<body>

    <div class="main-box">
        <h2 style="color: var(--neon); letter-spacing: 2px;">SYSTEM INTERFACE</h2>
        <input type="text" id="name" placeholder="ENTER HUNTER NAME">
        <label class="file-btn">
            <input type="file" id="pic" accept="image/*" style="display:none" onchange="document.getElementById('st').innerText='Photo Ready ✅'">
            <span id="st">UPLOAD HUNTER IMAGE</span>
        </label>
        <button class="awaken-btn" onclick="reg()">AWAKEN</button>
    </div>

    <div id="list" style="max-width:400px; margin:auto;"></div>

    <script>
        const SUPABASE_URL = 'https://wtuqqbgdekhuwieznaxw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_-YVfJ-nKqdi6SLR2EY_-PA_C5LVa59-';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function reg() {
            const n = document.getElementById('name').value;
            const f = document.getElementById('pic').files[0];
            if(!n || !f) return alert("System requires Name and Image!");

            const reader = new FileReader();
            reader.readAsDataURL(f);
            reader.onload = async () => {
                const { error } = await sb.from('hunters').insert([{ 
                    name: n, level: 1, image_url: reader.result,
                    pushups: 0, situps: 0, squats: 0 
                }]);
                if(!error) location.reload();
                else alert("Error connecting to Gate.");
            };
        }

        async function updateQuest(id, type, current, name, level) {
            const newVal = current + 10;
            const { error } = await sb.from('hunters').update({ [type]: newVal }).eq('id', id);
            
            if(!error) {
                const { data: h } = await sb.from('hunters').select('*').eq('id', id).single();
                if(h.pushups >= 100 && h.situps >= 100 && h.squats >= 100) {
                    alert(`[LEVEL UP]\n\nHunter ${name}, you have surpassed your limits!\nNew Level: ${level + 1}`);
                    await sb.from('hunters').update({ level: level + 1, pushups: 0, situps: 0, squats: 0 }).eq('id', id);
                }
                load();
            }
        }

        async function load() {
            const { data } = await sb.from('hunters').select('*').order('created_at', { ascending: false });
            if(data) {
                document.getElementById('list').innerHTML = data.map(h => `
                    <div class="card" style="border-color: ${h.level >= 10 ? 'var(--s-rank)' : '#222'}">
                        <div class="user-header">
                            <img src="${h.image_url}" class="user-img" style="border-color: ${h.level >= 10 ? 'var(--s-rank)' : 'var(--neon)'}">
                            <div>
                                <div style="font-weight:bold; font-size:18px; text-transform:uppercase;">${h.name}</div>
                                <div style="color:${h.level >= 10 ? 'var(--s-rank)' : 'var(--neon)'}; font-size:12px; font-weight:bold;">
                                    ${h.level >= 10 ? 'S-RANK' : 'E-RANK'} HUNTER | LVL ${h.level}
                                </div>
                            </div>
                        </div>

                        <div class="quest-sec">
                            ${['pushups', 'situps', 'squats'].map(q => `
                                <div class="q-row">
                                    <div class="q-info"><span>${q.toUpperCase()}</span><span>${h[q] || 0}/100</span></div>
                                    <div class="bar-bg"><div class="bar-fill" style="width:${(h[q] || 0)}%; background:${h.level >= 10 ? 'var(--s-rank)' : 'var(--neon)'}"></div></div>
                                    <button class="btn-plus" onclick="updateQuest('${h.id}', '${q}', ${h[q]||0}, '${h.name}', ${h.level})">+</button>
                                </div>
                            `).join('')}
                        </div>

                        <div class="diet-tag">
                            <b>SYSTEM DIET:</b> ${h.level >= 10 ? 'High Protein + Recovery Supplements' : '4L Water, 6 Eggs, Oats'}
                        </div>
                    </div>
                `).join('');
            }
        }
        load();
    </script>
</body>
</html>
