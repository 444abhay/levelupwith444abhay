<!DOCTYPE html>
<html>
<head>
    <title>S-RANK HUNTER ID</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --s-rank: #ff0044; }
        body { background: #050505; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .main-box { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--neon); color: white; border-radius: 8px; }
        .file-btn { display: inline-block; padding: 10px; border: 1px dashed var(--neon); margin: 10px 0; cursor: pointer; width: 80%; }
        button { width: 85%; padding: 15px; background: var(--neon); border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        /* Card Style */
        .card { 
            background: #1a1a2e; margin-top: 20px; padding: 15px; border-radius: 15px; 
            display: flex; align-items: center; gap: 15px; text-align: left; border: 1px solid #222;
            position: relative; overflow: hidden;
        }
        .user-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; z-index: 2; }
        
        /* Anime Background Aura */
        .card::after {
            content: "HUNTER"; position: absolute; right: -10px; bottom: -5px;
            font-size: 40px; font-weight: 900; color: rgba(255,255,255,0.05); z-index: 1;
        }
    </style>
</head>
<body>
    <div class="main-box">
        <h2 style="color: var(--neon);">SYSTEM INTERFACE</h2>
        <input type="text" id="name" placeholder="ENTER NAME">
        <label class="file-btn">
            <input type="file" id="pic" accept="image/*" style="display:none" onchange="document.getElementById('st').innerText='Photo Selected!'">
            <span id="st">CLICK TO SELECT PHOTO</span>
        </label>
        <button onclick="reg()">AWAKEN</button>
    </div>
    <div id="list" style="max-width:400px; margin:auto;"></div>

    <script>
        const SUPABASE_URL = 'https://wtuqqbgdekhuwieznaxw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_-YVfJ-nKqdi6SLR2EY_-PA_C5LVa59-';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function reg() {
            const n = document.getElementById('name').value;
            const f = document.getElementById('pic').files[0];
            if(!n || !f) return alert("Photo aur Name dono dalo!");

            const reader = new FileReader();
            reader.readAsDataURL(f);
            reader.onload = async () => {
                const { error } = await sb.from('hunters').insert([{ name: n, level: 1, image_url: reader.result }]);
                if(!error) location.reload();
            };
        }

        async function load() {
            const { data } = await sb.from('hunters').select('*').order('created_at', { ascending: false });
            if(data) {
                document.getElementById('list').innerHTML = data.map(h => `
                    <div class="card">
                        <img src="${h.image_url}" class="user-img">
                        <div>
                            <div style="font-weight:bold; font-size:18px;">${h.name}</div>
                            <div style="color:var(--neon); font-size:12px;">LEVEL ${h.level}</div>
                        </div>
                    </div>
                `).join('');
            }
        }
        load();
    </script>
</body>
</html>
