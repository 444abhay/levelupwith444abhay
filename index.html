<!DOCTYPE html>
<html>
<head>
    <title>S-RANK HUNTER SYSTEM 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --dark-bg: #050505; }
        body { background: var(--dark-bg); color: white; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; overflow-x: hidden; }
        
        .box { 
            border: 2px solid var(--neon); padding: 30px; margin: 20px auto; max-width: 450px; 
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4); border-radius: 15px; 
            background: rgba(0, 0, 0, 0.9); position: relative;
        }

        h1 { font-size: 28px; text-transform: uppercase; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        
        input { 
            padding: 15px; margin: 15px 0; width: 90%; background: transparent; 
            border: 1px solid var(--neon); color: white; border-radius: 5px; outline: none;
            transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 15px var(--neon); background: rgba(0, 242, 255, 0.1); }

        button { 
            padding: 15px; width: 98%; background: var(--neon); color: black; 
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 10px var(--neon); border-radius: 5px;
        }
        button:hover { background: white; transform: scale(1.02); }

        .leaderboard { margin-top: 40px; text-align: left; }
        .hunter-row { 
            background: rgba(255, 255, 255, 0.05); margin: 10px 0; padding: 15px; 
            border-left: 4px solid var(--neon); display: flex; justify-content: space-between;
            align-items: center; border-radius: 4px;
        }

        /* Rank Colors */
        .rank-s { color: #ff0055; text-shadow: 0 0 10px #ff0055; font-weight: bold; }
        .rank-a { color: #ffaa00; font-weight: bold; }
        .status-msg { color: #0f0; font-size: 13px; margin: 10px 0; height: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>SYSTEM INTERFACE</h1>
        <p style="color: #666; font-size: 12px;">GATE STATUS: STABLE</p>
        
        <input type="text" id="username" placeholder="NAME OF THE HUNTER...">
        <button onclick="register()">WAKE UP</button>
        <div id="status" class="status-msg"></div>

        <div class="leaderboard">
            <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px;">GUILD MEMBERS</h3>
            <div id="hunter-list">Scanning...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wtuqqbgdekhuwieznaxw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_-YVfJ-nKqdi6SLR2EY_-PA_C5LVa59-';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getRank(level) {
            if(level >= 90) return '<span class="rank-s">S-RANK</span>';
            if(level >= 70) return '<span class="rank-a">A-RANK</span>';
            if(level >= 50) return '<span style="color:#00ff00">B-RANK</span>';
            return '<span style="color:#888">E-RANK</span>';
        }

        async function fetchHunters() {
            const { data, error } = await supabaseClient.from('hunters').select('*').order('created_at', { ascending: false });
            if (!error) {
                const list = document.getElementById('hunter-list');
                list.innerHTML = data.map(h => `
                    <div class="hunter-row">
                        <div>
                            <div style="font-size: 10px; color: #888;">HUNTER ID: ${h.id.slice(0,8)}</div>
                            <div style="font-size: 18px; letter-spacing: 1px;">${h.name.toUpperCase()}</div>
                        </div>
                        <div style="text-align: right;">
                            ${getRank(h.level)}<br>
                            <small style="color:#444">LVL ${h.level}</small>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function register() {
            const name = document.getElementById('username').value;
            const statusBox = document.getElementById('status');
            if(!name) return;

            statusBox.innerText = "UPDATING SYSTEM RECORDS...";
            const { error } = await supabaseClient.from('hunters').insert([{ name: name, level: 1 }]);

            if (error) { statusBox.innerText = "ERROR: " + error.message; } 
            else {
                statusBox.innerText = "REGISTRATION COMPLETE.";
                document.getElementById('username').value = "";
                fetchHunters();
            }
        }

        fetchHunters();
    </script>
</body>
</html>
