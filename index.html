<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: Hunter System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #050505; 
            --panel: rgba(10, 10, 10, 0.9);
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }

        /* Ambient Aura Background */
        .aura {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #001e22 0%, transparent 80%);
            z-index: -1;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; } to { opacity: 0.8; }
        }

        .container { 
            background: var(--panel); 
            border: 1px solid var(--neon); 
            border-radius: 2px; 
            padding: 20px; 
            width: 100%; 
            max-width: 360px; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); 
            margin-top: 20px;
            backdrop-filter: blur(10px);
        }

        .header {
            border-bottom: 2px solid var(--neon);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: left;
        }

        h2 { color: var(--neon); text-transform: uppercase; letter-spacing: 4px; margin: 0; font-size: 18px; }
        .rank { background: var(--neon); color: black; padding: 2px 8px; font-weight: bold; font-size: 10px; margin-top: 5px; display: inline-block; }

        /* Quest Cards */
        .quest-card { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 20px; 
            margin: 15px 0; 
            border: 1px solid rgba(0, 242, 255, 0.2);
            text-align: left;
            position: relative;
        }

        .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .counter { font-size: 28px; color: var(--neon); font-weight: bold; display: block; margin: 5px 0; }

        .btn { 
            width: 100%; 
            padding: 12px; 
            background: transparent; 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .btn:active { background: var(--neon); color: black; transform: scale(0.98); }

        /* Music Visualizer */
        .music-box {
            margin-top: 30px;
            text-align: center;
        }

        .viz {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 35px;
            gap: 4px;
            margin-bottom: 15px;
        }

        .bar { width: 5px; background: var(--neon); height: 5px; }
        .bar.animate { animation: bounce 0.6s infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }

        @keyframes bounce { from { height: 5px; } to { height: 30px; } }

        .status-msg { font-size: 10px; color: var(--neon); margin-bottom: 5px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="aura"></div>

<div class="container">
    <div class="header">
        <h2>QUEST INFO</h2>
        <div class="rank">RANK: E-CLASS</div>
    </div>

    <div class="quest-card">
        <span class="label">Daily Goal: Pushups</span>
        <span class="counter" id="p-count">0 / 100</span>
        <button class="btn" onclick="addRep('pushups')">Add Repetition</button>
    </div>

    <div class="quest-card">
        <span class="label">Daily Goal: Situps</span>
        <span class="counter" id="si-count">0 / 100</span>
        <button class="btn" onclick="addRep('situps')">Add Repetition</button>
    </div>

    <div class="music-box">
        <div class="status-msg" id="track-name">SYSTEM BGM: PLAYER_ONE</div>
        <div class="viz" id="visualizer">
