<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: Hunter System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0a; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
            overflow-x: hidden;
        }
        .container { 
            background: #111; 
            border: 2px solid var(--neon); 
            border-radius: 15px; 
            padding: 25px; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); 
            text-align: center; 
            margin-top: 30px;
        }
        h2 { color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-size: 22px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; /* Prevents iOS zoom */
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--neon); 
            border: none; 
            color: black; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 10px; 
            text-transform: uppercase; 
            margin-top: 15px;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent; /* Fixes blue flash on mobile */
            touch-action: manipulation;
        }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .hidden { display: none !important; }
        .stat-card { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 12px 0; 
            border-left: 5px solid var(--neon); 
            text-align: left; 
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container" id="auth-section">
    <h2>SYSTEM ACCESS</h2>
    <p style="color: #666; font-size: 12px; margin-bottom: 15px;">AUTHENTICATE TO AWAKEN</p>
    <input type="email" id="email" placeholder="Hunter Email" autocomplete="email">
    <button type="button" id="sendBtn">SEND ACCESS CODE</button>
    <div style="margin: 25px 0; height: 1px; background: #222;"></div>
    <input type="text" id="otp" placeholder="Enter 6-Digit OTP" inputmode="numeric">
    <button type="button" id="verifyBtn">INITIALIZE SYSTEM</button>
</div>
