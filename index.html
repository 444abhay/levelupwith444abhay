<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Rank Hunter System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: #111; border: 2px solid var(--neon); border-radius: 15px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 0 20px var(--neon); }
        h2 { color: var(--neon); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--neon); border: none; color: black; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        button:hover { background: white; box-shadow: 0 0 15px white; }
        .hidden { display: none; }
        .stat-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 10px 0; border-left: 4px solid var(--neon); }
        .rank { font-size: 24px; font-weight: bold; color: gold; text-align: center; display: block; }
        img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon); display: block; margin: 0 auto 10px; object-fit: cover; }
    </style>
</head>
<body>

<div class="container" id="auth-section">
    <h2>System Access</h2>
    <input type="email" id="email" placeholder="Enter Hunter Email">
    <button onclick="sendOTP()">Send OTP</button>
    <input type="text" id="otp" placeholder="Enter 6-Digit OTP">
    <button onclick="verifyOTP()">Verify & Login</button>
</div>

<div class="container hidden" id="dashboard-section">
    <img id="pfp" src="https://via.placeholder.com/80" alt="Hunter">
    <span class="rank" id="rank-display">E-RANK</span>
    <h2 id="hunter-name">Hunter</h2>
    
    <div class="stat-card">Pushups: <span id="p-count">0</span></div>
    <div class="stat-card">Situps: <span id="si-count">0</span></div>
    <div class="stat-card">Squats: <span id="sq-count">0</span></div>
    
    <button onclick="updateStat('pushups')">+10 Pushups</button>
    <button onclick="updateStat('situps')">+10 Situps</button>
    <button onclick="updateStat('squats')">+10 Squats</button>
    <button style="background: #ff4444;" onclick="logout()">Disconnect</button>
</div>

<script>
    const SB_URL = "YOUR_SUPABASE_URL";
    const SB_KEY = "YOUR_SUPABASE_ANON_KEY";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    async function sendOTP() {
        const email = document.getElementById('email').value;
        const { error } = await supabase.auth.signInWithOtp({ email, options: { shouldCreateUser: true }});
        if (error) alert(error.message);
        else alert("OTP sent to your email!");
    }

    async function verifyOTP() {
        const email = document.getElementById('email').value;
        const token = document.getElementById('otp').value;
        const { data, error } = await supabase.auth.verifyOtp({ email, token, type: 'email' });
        
        if (error) {
            // Backup check if type is signup
            const { error: error2 } = await supabase.auth.verifyOtp({ email, token, type: 'signup' });
            if (error2) alert("Invalid OTP Hunter!");
            else checkSession();
        } else {
            checkSession();
        }
    }

    async function checkSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            loadHunterData(session.user.id);
        }
    }

    async function loadHunterData(userId) {
        let { data, error } = await supabase.from('hunters').select('*').eq('user_id', userId).single();
        
        if (!data) {
            // First time login - create record
            const { data: newUser } = await supabase.from('hunters').insert([{ user_id: userId, pushups: 0, situps: 0, squats: 0 }]).select().single();
            data = newUser;
        }

        document.getElementById('hunter-name').innerText = data.user_id.substring(0,8);
        document.getElementById('p-count').innerText = data.pushups;
        document.getElementById('si-count').innerText = data.situps;
        document.getElementById('sq-count').innerText = data.squats;
        if(data.image_url) document.getElementById('pfp').src = data.image_url;
    }

    async function updateStat(type) {
        const { data: { session } } = await supabase.auth.getSession();
        const userId = session.user.id;
        
        const currentVal = parseInt(document.getElementById(type === 'pushups' ? 'p-count' : type === 'situps' ? 'si-count' : 'sq-count').innerText);
        const newVal = currentVal + 10;

        const { error } = await supabase.from('hunters').update({ [type]: newVal }).eq('user_id', userId);
        
        if (!error) loadHunterData(userId);
        else alert("Sync Failed!");
    }

    async function logout() {
        await supabase.auth.signOut();
        window.location.reload();
    }

    checkSession();
</script>

</body>
</html>
